name: Ibime Keep-Awake Heartbeat

on:
  schedule:
    - cron: '0 */12 * * *' # Ejecutar cada 12 horas
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend and Database
        run: |
          curl -X GET "https://ibime-backend.onrender.com/health" \
          -H "Accept: application/json"

