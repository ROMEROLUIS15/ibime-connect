name: Playwright E2E Tests

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  e2e-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        # Exigimos instalar chromium únicamente para optimizar velocidad
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          # Inyectamos variables Dummy para que el backend no aborte de inmediato por lack of config (env.config.ts)
          SUPABASE_URL: "http://dummy-supabase.url"
          SUPABASE_SERVICE_ROLE_KEY: "dummy-key"
          GEMINI_API_KEY: "dummy-key"
          GROQ_API_KEY: "dummy-key"
          REDIS_URL: "redis://localhost:6379"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 15
