name: Quality Gate CI

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps
          
      # Alerta de vulnerabilidades conocidas. No-bloqueante por ahora
      # (continue-on-error) para no frenar merges mientras se saneia el arbol;
      # endurecer a bloqueante (quitar continue-on-error) cuando este limpio.
      - name: Security Audit (backend)
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Security Audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint Code
        run: npm run lint
        
      - name: Typecheck
        run: npm run typecheck
        
      - name: Run Tests
        run: npm run test
        env:
          SUPABASE_URL: "http://dummy-supabase.url"
          SUPABASE_SERVICE_ROLE_KEY: "dummy-key"
          GEMINI_API_KEY: "dummy-key"
          GROQ_API_KEY: "dummy-key"
          REDIS_URL: "redis://localhost:6379"
