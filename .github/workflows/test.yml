name: Ibime Connect Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies (Root)
      run: npm install

    - name: Install dependencies (Backend)
      run: cd backend && npm install

    - name: Install dependencies (Frontend)
      run: cd frontend && npm install

    - name: Run Backend Unit Tests
      run: cd backend && npm test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: npx playwright test
      env:
        # Nota: Para que los tests E2E funcionen en CI, se requieren las variables de entorno 
        # para que el backend pueda iniciar (o usar mocks).
        # Aquí se asume que el webServer en playwright.config.ts se encarga de todo.
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        FRONTEND_URL: http://localhost:4000
        PORT: 3000

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
