version: 2
updates:
  # Raíz del monorepo (herramientas: husky, lint-staged, playwright, tsx…)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]

  # Acciones de GitHub (mantener los workflows al día en seguridad)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
