services:
  - type: web
    name: ibime-backend
    runtime: node
    plan: free
    region: oregon
    
    rootDir: backend

    buildCommand: npm install && npm run build
    startCommand: npm start

    healthCheckPath: /
    autoDeploy: true

    envVars:
      # Node 22 LTS: @supabase/supabase-js 2.110+ (realtime-js) requiere WebSocket
      # nativo, disponible desde Node 22. Con Node 20 el backend fallaba al arrancar
      # (createClient lanza "native WebSocket not found").
      - key: NODE_VERSION
        value: 22.11.0
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://ibime-connect.vercel.app
      
      # 1. Nombres LIMPIOS (sin VITE_) para que coincidan con tu env.config.ts
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Modelo de inferencia (no es secreto). Reemplaza a llama-3.1-8b-instant,
      # deprecado por Groq y sin servicio desde 2026-08-16.
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b

      # Límites reales del plan de Groq. GROQ_SAFETY_MARGIN se aplica solo a las
      # ventanas por minuto; las cuotas diarias se usan íntegras.
      # Ajústalos si cambias de plan o de modelo.
      - key: GROQ_TPM_LIMIT
        value: 8000
      - key: GROQ_RPM_LIMIT
        value: 30
      - key: GROQ_RPD_LIMIT
        value: 1000
      - key: GROQ_TPD_LIMIT
        value: 200000
      - key: GROQ_SAFETY_MARGIN
        value: 0.8

      # 2. Las que faltaban para ser un espejo de tu .env
      - key: SUPABASE_PROJECT_ID
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ADMIN_SECRET
        sync: false

      # 3. Observability (Sentry) — opcional; sin DSN la captura es no-op
      - key: SENTRY_DSN
        sync: false

      # 4. Observability (LangSmith)
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false
